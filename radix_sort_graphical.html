<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radix Sort 图形演示</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; }
    main { max-width: 1180px; margin: 0 auto; padding: 28px; }
    h1 { margin: 0 0 8px; font-size: 30px; }
    h2 { margin: 0 0 12px; }
    .subtitle { margin: 0 0 24px; color: #94a3b8; }
    .panel { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 18px; box-shadow: 0 18px 40px rgba(0,0,0,.25); }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
    button.secondary { background: #475569; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .stage-title { display: flex; justify-content: space-between; gap: 16px; align-items: baseline; margin-bottom: 14px; }
    .stage-title h2 { margin: 0; font-size: 22px; }
    .stage-title span { color: #93c5fd; font-weight: 800; }
    .explain { color: #cbd5e1; line-height: 1.7; margin: 8px 0 0; }
    .formula { display: inline-block; margin-top: 10px; padding: 8px 10px; border-radius: 10px; background: #020617; border: 1px solid #334155; color: #fef3c7; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .array-row { margin-bottom: 18px; }
    .array-label { color: #93c5fd; font-weight: 800; margin-bottom: 8px; }
    .array { display: flex; flex-wrap: wrap; gap: 10px; min-height: 86px; }
    .card { width: 88px; min-height: 78px; border-radius: 14px; display: grid; place-items: center; background: #1e293b; border: 2px solid #475569; }
    .card.temp { background: #312e81; border-color: #818cf8; }
    .card.empty { background: #020617; border-style: dashed; color: #475569; }
    .num { font-size: 22px; font-weight: 900; }
    .digit { margin-top: 3px; color: #bfdbfe; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .bucket { border-radius: 14px; padding: 12px; min-height: 108px; background: #020617; border: 1px solid #334155; }
    .bucket-label { color: #93c5fd; font-weight: 900; margin-bottom: 8px; }
    .bucket-meta { color: #cbd5e1; font-size: 13px; line-height: 1.55; margin-bottom: 8px; }
    .bucket-items { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { padding: 5px 8px; border-radius: 999px; background: #334155; color: #f8fafc; font-weight: 800; font-size: 13px; }
    .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
    .tick { text-align: center; padding: 8px; border-radius: 10px; background: #1e293b; color: #94a3b8; font-weight: 800; }
    .tick.active { background: #2563eb; color: white; }
    .phasebar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
    .phase { text-align: center; padding: 8px; border-radius: 10px; background: #020617; border: 1px solid #334155; color: #94a3b8; font-weight: 900; }
    .phase.active { color: #111827; background: #facc15; border-color: #facc15; }
    .mapping-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
    .map-card { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px; border-radius: 12px; background: #020617; border: 1px solid #334155; }
    .map-node { padding: 8px 10px; border-radius: 10px; background: #1e293b; font-weight: 900; text-align: center; min-width: 76px; }
    .map-node.temp-node { background: #312e81; border: 1px solid #818cf8; }
    .arrow { color: #facc15; font-weight: 1000; font-size: 24px; }
    .map-detail { color: #bfdbfe; font-size: 12px; margin-top: 2px; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Radix Sort 图形演示</h1>
    <p class="subtitle">按照真实算法粒度展示：freq → prefix sum → scatter → swap。输入包含重复值和第一轮 digit 相同的元素。</p>

    <section class="panel">
      <div class="controls">
        <button id="prev">上一步</button>
        <button id="next">下一步</button>
        <button id="play">自动播放</button>
        <button id="reset" class="secondary">重置</button>
      </div>
      <div class="timeline" id="timeline"></div>
      <div class="phasebar" id="phasebar"></div>
    </section>

    <section class="panel">
      <div class="stage-title">
        <h2 id="title"></h2>
        <span id="pass"></span>
      </div>
      <p class="explain" id="explain"></p>
      <div class="formula" id="formula"></div>
    </section>

    <section class="panel">
      <div class="array-row">
        <div class="array-label">data</div>
        <div class="array" id="dataArray"></div>
      </div>
      <div class="array-row">
        <div class="array-label">temp</div>
        <div class="array" id="tempArray"></div>
      </div>
      <div class="array-row">
        <div class="array-label">scatter 映射关系</div>
        <div class="mapping-grid" id="scatterMap"></div>
      </div>
    </section>

    <section class="panel">
      <h2>bucket / count / prefix 视图</h2>
      <div class="grid" id="buckets"></div>
    </section>
  </main>

  <script>
    const original = [
      { value: 257, label: "257a" },
      { value: 1, label: "1" },
      { value: 257, label: "257b" },
      { value: 513, label: "513" },
      { value: 2, label: "2" },
      { value: 258, label: "258" },
      { value: 0, label: "0" },
      { value: 256, label: "256" }
    ];
    const passes = [0, 8, 16, 24];
    const phases = ["freq", "prefix sum", "scatter", "swap"];

    function digitOf(item, shift) {
      return (item.value >>> shift) & 255;
    }

    function cloneBuckets(buckets) {
      const next = new Map();
      for (const [k, v] of buckets) next.set(k, v.slice());
      return next;
    }

    function buildPassState(data, shift) {
      const buckets = new Map();
      for (const item of data) {
        const d = digitOf(item, shift);
        if (!buckets.has(d)) buckets.set(d, []);
        buckets.get(d).push(item);
      }

      const ids = Array.from(buckets.keys()).sort((a, b) => a - b);
      const counts = new Map();
      const starts = new Map();
      let sum = 0;
      for (const id of ids) {
        const count = buckets.get(id).length;
        counts.set(id, count);
        starts.set(id, sum);
        sum += count;
      }

      const temp = Array(data.length).fill(null);
      const nextPos = new Map(starts);
      const placements = [];
      for (let from = 0; from < data.length; ++from) {
        const item = data[from];
        const d = digitOf(item, shift);
        const pos = nextPos.get(d);
        nextPos.set(d, pos + 1);
        temp[pos] = item;
        placements.push({ item, digit: d, from, pos });
      }

      return { buckets, counts, starts, temp, placements };
    }

    function buildSteps() {
      const steps = [];
      let data = original.slice();

      steps.push({
        phase: "start",
        shift: null,
        data: data.slice(),
        temp: Array(data.length).fill(null),
        buckets: new Map(),
        counts: new Map(),
        starts: new Map(),
        placements: [],
        title: "开始",
        explain: "257a 和 257b 是重复值；1、257、513 的最低 8 bit 都是 1。第一轮可以观察稳定性。",
        formula: "data = [257a, 1, 257b, 513, 2, 258, 0, 256]"
      });

      for (const shift of passes) {
        const state = buildPassState(data, shift);

        steps.push({
          phase: "freq",
          shift,
          data: data.slice(),
          temp: Array(data.length).fill(null),
          buckets: cloneBuckets(state.buckets),
          counts: new Map(state.counts),
          starts: new Map(),
          placements: [],
          title: "1. freq / histogram",
          explain: "遍历 data，计算当前 byte 的 digit，并统计每个 bucket 的频率。相同 digit 的元素会进入同一个 bucket。",
          formula: "for x in data: count[(x >> shift) & 0xff]++"
        });

        steps.push({
          phase: "prefix sum",
          shift,
          data: data.slice(),
          temp: Array(data.length).fill(null),
          buckets: cloneBuckets(state.buckets),
          counts: new Map(state.counts),
          starts: new Map(state.starts),
          placements: [],
          title: "2. prefix sum",
          explain: "把频率 count 转换成每个 bucket 在 temp 中的起始写入位置。这个位置就是 scatter 的全局偏移。",
          formula: "start[i] = count[0] + count[1] + ... + count[i - 1]"
        });

        steps.push({
          phase: "scatter",
          shift,
          data: data.slice(),
          temp: state.temp.slice(),
          buckets: cloneBuckets(state.buckets),
          counts: new Map(state.counts),
          starts: new Map(state.starts),
          placements: state.placements.slice(),
          title: "3. stable scatter",
          explain: "从左到右遍历 data，把元素写到 temp[start[digit]++]。桶内顺序不变，所以这一轮是稳定的。",
          formula: "temp[count[digit]++] = x"
        });

        steps.push({
          phase: "swap",
          shift,
          data: state.temp.slice(),
          temp: data.slice(),
          buckets: cloneBuckets(state.buckets),
          counts: new Map(state.counts),
          starts: new Map(state.starts),
          placements: state.placements.slice(),
          title: "4. swap data 和 temp",
          explain: "scatter 得到的新顺序在 temp 中。swap 之后，下一轮继续以这个结果作为 data。",
          formula: "data.swap(temp)"
        });

        data = state.temp.slice();
      }

      steps.push({
        phase: "done",
        shift: 24,
        data: data.slice(),
        temp: Array(data.length).fill(null),
        buckets: new Map(),
        counts: new Map(),
        starts: new Map(),
        placements: [],
        title: "完成排序",
        explain: "4 轮后，低 32 bit 全部处理完成。对于 uint32_t，这就是完整升序结果。",
        formula: "4 passes × 8 bits = 32 bits"
      });

      return steps;
    }

    const steps = buildSteps();
    let stepIndex = 0;
    let timer = null;

    const dataArrayEl = document.getElementById("dataArray");
    const tempArrayEl = document.getElementById("tempArray");
    const bucketsEl = document.getElementById("buckets");
    const scatterMapEl = document.getElementById("scatterMap");
    const titleEl = document.getElementById("title");
    const passEl = document.getElementById("pass");
    const explainEl = document.getElementById("explain");
    const formulaEl = document.getElementById("formula");
    const timelineEl = document.getElementById("timeline");
    const phasebarEl = document.getElementById("phasebar");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const playBtn = document.getElementById("play");
    const resetBtn = document.getElementById("reset");

    function renderArray(el, items, shift, temp) {
      el.innerHTML = "";
      for (let i = 0; i < items.length; ++i) {
        const item = items[i];
        const card = document.createElement("div");
        if (item === null) {
          card.className = "card empty";
          card.innerHTML = `<div><div class="num">[${i}]</div><div class="digit">empty</div></div>`;
        } else {
          const digit = shift === null ? "-" : digitOf(item, shift);
          card.className = temp ? "card temp" : "card";
          card.innerHTML = `<div><div class="num">${item.label}</div><div class="digit">value: ${item.value}</div><div class="digit">digit: ${digit}</div></div>`;
        }
        el.appendChild(card);
      }
    }

    function renderScatterMap(step) {
      scatterMapEl.innerHTML = "";
      if (step.placements.length === 0 || (step.phase !== "scatter" && step.phase !== "swap")) {
        const empty = document.createElement("p");
        empty.className = "explain";
        empty.textContent = "到 scatter 阶段会显示每个元素从 data 下标写入 temp 下标的箭头。";
        scatterMapEl.appendChild(empty);
        return;
      }

      for (const p of step.placements) {
        const div = document.createElement("div");
        div.className = "map-card";
        div.innerHTML = `
          <div class="map-node">data[${p.from}]<div class="map-detail">${p.item.label}</div></div>
          <div class="arrow">→</div>
          <div class="map-node temp-node">temp[${p.pos}]<div class="map-detail">digit ${p.digit}</div></div>
        `;
        scatterMapEl.appendChild(div);
      }
    }

    function renderBuckets(step) {
      bucketsEl.innerHTML = "";
      const ids = Array.from(step.buckets.keys()).sort((a, b) => a - b);
      if (ids.length === 0) {
        const empty = document.createElement("p");
        empty.className = "explain";
        empty.textContent = "这一阶段还没有 bucket 信息。";
        bucketsEl.appendChild(empty);
        return;
      }

      for (const id of ids) {
        const items = step.buckets.get(id);
        const count = step.counts.has(id) ? step.counts.get(id) : "-";
        const start = step.starts.has(id) ? step.starts.get(id) : "-";
        const div = document.createElement("div");
        div.className = "bucket";
        div.innerHTML = `
          <div class="bucket-label">bucket ${id}</div>
          <div class="bucket-meta">freq = ${count}<br>prefix start = ${start}</div>
          <div class="bucket-items">${items.map(item => `<span class="pill">${item.label}</span>`).join("")}</div>
        `;
        bucketsEl.appendChild(div);
      }
    }

    function render() {
      const step = steps[stepIndex];
      titleEl.textContent = step.title;
      passEl.textContent = step.shift === null ? "准备阶段" : `shift = ${step.shift}`;
      explainEl.textContent = step.explain;
      formulaEl.textContent = step.formula;

      renderArray(dataArrayEl, step.data, step.shift, false);
      renderArray(tempArrayEl, step.temp, step.shift, true);
      renderScatterMap(step);
      renderBuckets(step);

      timelineEl.innerHTML = "";
      for (let i = 0; i < passes.length; ++i) {
        const tick = document.createElement("div");
        tick.className = "tick";
        if (step.shift === passes[i]) tick.classList.add("active");
        tick.textContent = `第 ${i + 1} 轮：bits ${passes[i]}..${passes[i] + 7}`;
        timelineEl.appendChild(tick);
      }

      phasebarEl.innerHTML = "";
      for (const phase of phases) {
        const div = document.createElement("div");
        div.className = "phase";
        if (step.phase === phase) div.classList.add("active");
        div.textContent = phase;
        phasebarEl.appendChild(div);
      }

      prevBtn.disabled = stepIndex === 0;
      nextBtn.disabled = stepIndex === steps.length - 1;
    }

    function stopPlay() {
      if (timer !== null) {
        clearInterval(timer);
        timer = null;
        playBtn.textContent = "自动播放";
      }
    }

    prevBtn.addEventListener("click", () => {
      stopPlay();
      stepIndex = Math.max(0, stepIndex - 1);
      render();
    });

    nextBtn.addEventListener("click", () => {
      stopPlay();
      stepIndex = Math.min(steps.length - 1, stepIndex + 1);
      render();
    });

    resetBtn.addEventListener("click", () => {
      stopPlay();
      stepIndex = 0;
      render();
    });

    playBtn.addEventListener("click", () => {
      if (timer !== null) {
        stopPlay();
        return;
      }
      playBtn.textContent = "暂停";
      timer = setInterval(() => {
        if (stepIndex === steps.length - 1) {
          stopPlay();
          return;
        }
        stepIndex++;
        render();
      }, 1300);
    });

    render();
  </script>
</body>
</html>
